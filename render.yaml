services:
  - type: web
    name: dqor-tickets
    runtime: docker
    plan: starter
    region: singapore
    autoDeploy: true
    healthCheckPath: /up
    disk:
      name: dqor-storage
      mountPath: /rails/storage
      sizeGB: 1
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SELLER_NAME
        sync: false
      - key: SELLER_GSTIN
        sync: false
      - key: SELLER_ADDRESS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_HOST
        value: tickets.deccanqueenonrails.com
      - key: WEB_CONCURRENCY
        value: 1
      - key: RAILS_MAX_THREADS
        value: 5
